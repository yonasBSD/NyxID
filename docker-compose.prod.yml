# Production Docker Compose for NyxID.
#
# Quickstart (3 required env vars — see .env.production.example):
#     cp .env.production.example .env.production
#     $EDITOR .env.production
#     docker compose -f docker-compose.prod.yml --env-file .env.production pull
#     docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Multi-arch images are published to GitHub Container Registry by the
# `Publish Images` workflow on every merge to main and on every `v*` tag.
# Override the version by exporting NYXID_VERSION (defaults to `latest`).
#
# To build locally instead of pulling, uncomment the `build:` blocks below.

services:
  backend:
    image: ghcr.io/chronoaiproject/nyxid/backend:${NYXID_VERSION:-latest}
    # build:
    #   context: .
    #   dockerfile: backend/Dockerfile
    container_name: nyxid-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    environment:
      # Constructed here so ${MONGO_ROOT_PASSWORD} is interpolated by compose.
      # env_file entries are passed through to the container verbatim (no
      # ${...} expansion), so DATABASE_URL must live in this block.
      DATABASE_URL: mongodb://${MONGO_ROOT_USER:-nyxid}:${MONGO_ROOT_PASSWORD}@mongodb:27017/nyxid?authSource=admin
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/chronoaiproject/nyxid/frontend:${NYXID_VERSION:-latest}
    # build:
    #   context: frontend
    #   dockerfile: Dockerfile
    container_name: nyxid-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

  mongodb:
    image: mongo:8.0
    container_name: nyxid-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-nyxid}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: nyxid
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
