<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accept Credential - NyxID</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0c111d;
        color: #f4f7fb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(31, 44, 69, 0.72), rgba(12, 17, 29, 0.96)),
          #0c111d;
      }
      main {
        box-sizing: border-box;
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        color: #aebbd0;
        line-height: 1.6;
      }
      button,
      input {
        font: inherit;
      }
      button {
        border: 1px solid #41506a;
        border-radius: 6px;
        background: #f4f7fb;
        color: #101828;
        cursor: pointer;
        font-weight: 600;
        padding: 10px 14px;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #41506a;
        border-radius: 6px;
        background: #111827;
        color: #f4f7fb;
        padding: 11px 12px;
      }
      label {
        display: block;
        color: #d9e2f2;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      code {
        color: #d9e2f2;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }
      .panel {
        border: 1px solid #263449;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.88);
        padding: 20px;
      }
      .stack {
        display: grid;
        gap: 16px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .muted {
        color: #aebbd0;
        font-size: 13px;
      }
      .status {
        display: inline-flex;
        border: 1px solid #314158;
        border-radius: 999px;
        color: #c9d6ea;
        font-size: 12px;
        padding: 4px 9px;
      }
      .danger {
        border-color: #7f1d1d;
        color: #fecaca;
      }
      .success {
        border-color: #166534;
        color: #bbf7d0;
      }
      .warning {
        border-color: #854d0e;
        color: #fde68a;
      }
      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .check-row input {
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="credential-accept-root" class="stack" aria-live="polite">
        <section class="panel stack">
          <div>
            <h1>Accept Credential</h1>
            <p>Loading credential integrity metadata.</p>
          </div>
        </section>
      </div>
    </main>
    <script
      type="module"
      data-nyx-integrity-role="credential_accept_script"
      src="/src/credential-accept/main.ts"
    ></script>
  </body>
</html>
