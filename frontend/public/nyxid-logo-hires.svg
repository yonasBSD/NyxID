<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1024"
  height="1024"
  viewBox="0 0 130 130"
  fill="none"
>
  <defs>
    <!-- Dark background gradient -->
    <radialGradient id="bg" cx="65" cy="65" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1525" />
      <stop offset="70%" stop-color="#110e18" />
      <stop offset="100%" stop-color="#0a0810" />
    </radialGradient>

    <!-- Radial glow -->
    <radialGradient id="glow" cx="65" cy="65" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>

    <!-- Arc Outer — left to right fade -->
    <linearGradient id="arc-outer" gradientUnits="userSpaceOnUse" x1="10" y1="65" x2="120" y2="65">
      <stop offset="0" stop-color="#A78BFA" />
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0" />
    </linearGradient>

    <!-- Arc Mid — rotated 120° -->
    <linearGradient id="arc-mid" gradientUnits="userSpaceOnUse" x1="10" y1="65" x2="120" y2="65" gradientTransform="rotate(120 65 65)">
      <stop offset="0" stop-color="#C4B5FD" />
      <stop offset="0.5" stop-color="#C4B5FD" stop-opacity="0" />
    </linearGradient>

    <!-- Arc Inner — rotated 240° -->
    <linearGradient id="arc-inner" gradientUnits="userSpaceOnUse" x1="10" y1="65" x2="120" y2="65" gradientTransform="rotate(240 65 65)">
      <stop offset="0" stop-color="#DDD6FE" />
      <stop offset="0.5" stop-color="#DDD6FE" stop-opacity="0" />
    </linearGradient>

    <!-- Void Moon fill — rotated 160° -->
    <linearGradient id="void-moon" gradientUnits="userSpaceOnUse" x1="56" y1="62" x2="86" y2="62" gradientTransform="rotate(160 71 62)">
      <stop offset="0" stop-color="#C4B5FD" />
      <stop offset="1" stop-color="#7C3AED" />
    </linearGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="65" cy="65" r="62" fill="url(#bg)" />

  <!-- Radial glow overlay -->
  <circle cx="65" cy="65" r="65" fill="url(#glow)" />

  <!-- Arc Outer: r=55 -->
  <circle cx="65" cy="65" r="55" fill="none" stroke="url(#arc-outer)" stroke-width="1" />

  <!-- Arc Mid: r=40 -->
  <circle cx="65" cy="65" r="40" fill="none" stroke="url(#arc-mid)" stroke-width="1" />

  <!-- Arc Inner: r=25 -->
  <circle cx="65" cy="65" r="25" fill="none" stroke="url(#arc-inner)" stroke-width="0.8" />

  <!-- Void Moon crescent -->
  <path
    d="M24 0q6 8 6 20 0 12-6 20-14-4-20-12-4-14-2-24 4-4 22-4z"
    transform="translate(56 42)"
    fill="url(#void-moon)"
  />

  <!-- Particles -->
  <circle cx="31.5" cy="49.5" r="1.5" fill="#C4B5FD" />
  <circle cx="39" cy="63" r="1" fill="#C4B5FD" opacity="0.5" />
  <circle cx="25" cy="69" r="1" fill="#C4B5FD" opacity="0.31" />
  <circle cx="89" cy="25" r="1" fill="#A78BFA" opacity="0.25" />
</svg>
