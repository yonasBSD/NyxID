name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe the feature and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What use case does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work? Include API examples, UI mockups, or architecture sketches if helpful.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of NyxID would this affect?
      options:
        - Backend (Rust/Axum)
        - Frontend (React)
        - Mobile App (React Native)
        - Node Agent (nyxid node)
        - OAuth SDK
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?
