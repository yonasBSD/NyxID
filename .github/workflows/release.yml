name: Release

# Creates a GitHub Release with an auto-generated changelog when a `v*` tag is
# pushed. Container images are built and pushed separately by
# `publish-images.yml`, which also runs on tag pushes and gates on CI.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Create GitHub Release with changelog. CI gating lives in publish-images.yml
  # for tag pushes -- the release notes job itself is pure git log + changelog
  # generation and does not need to re-run CI.
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changes }}

            ## Container images

            Multi-arch (linux/amd64, linux/arm64) images for this release are
            published to GitHub Container Registry by the `Publish Images`
            workflow:

            - `ghcr.io/chronoaiproject/nyxid/backend:${{ github.ref_name }}`
            - `ghcr.io/chronoaiproject/nyxid/frontend:${{ github.ref_name }}`
            - `ghcr.io/chronoaiproject/nyxid/node-agent:${{ github.ref_name }}`
          generate_release_notes: true
