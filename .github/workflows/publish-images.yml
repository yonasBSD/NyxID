name: Publish Images

# Publishes multi-arch (amd64 + arm64) container images to GitHub Container
# Registry on:
#   - every push to `main`             -> tags: main, main-<sha>, edge
#   - every pushed tag matching v*.*.* -> tags: <version>, <major>.<minor>, <major>, latest
#
# Components: backend, frontend, node-agent.
# mcp-proxy is intentionally excluded (source not yet in repo).
#
# Published images are public. A one-time visibility flip runs after the first
# successful push of each component; subsequent runs are a no-op.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Reuse the CI workflow as a gate so we never publish a broken build.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Build + push multi-arch images for each component.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: ci-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: .
            file: backend/Dockerfile
          - component: frontend
            context: frontend
            file: frontend/Dockerfile
          - component: node-agent
            context: .
            file: cli/Dockerfile.node
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image repo
        id: repo
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/nyxid/${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            # Tag pushes: semver ladder + `latest`
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Main branch pushes: rolling tags
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=nyxid-${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false

  # ---------------------------------------------------------------------------
  # Flip new packages to public visibility. Idempotent: a no-op once public.
  # Runs only on main / tag pushes (not manual dispatch) to avoid surprises.
  # ---------------------------------------------------------------------------
  make-public:
    name: Ensure public visibility
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - name: Flip package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for component in backend frontend node-agent; do
            package="nyxid/${component}"
            encoded=$(printf '%s' "$package" | jq -sRr @uri)
            echo "Ensuring ghcr.io/${owner}/${package} is public..."
            gh api \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${owner}/packages/container/${encoded}/visibility" \
              -f visibility=public \
              || echo "  (skipped: package may not exist yet or already public)"
          done
