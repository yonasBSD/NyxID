name: Publish Images

# Publishes multi-arch (amd64 + arm64) container images to GitHub Container
# Registry on:
#   - every push to `main`             -> tags: main, main-<sha>, edge
#   - every pushed tag matching v*.*.* -> tags: <version>, <major>.<minor>, <major>, latest
#
# Components: backend, frontend, node-agent.
# mcp-proxy is intentionally excluded (source not yet in repo).
#
# Build strategy: native runner matrix (no QEMU). The `build` job fans out
# across (component x platform), with linux/arm64 jobs running on
# ubuntu-24.04-arm for native speed. Each build pushes by digest only; the
# `merge` job then creates the multi-arch manifest list with the real tags.
# Reference: https://docs.docker.com/build/ci/github-actions/multi-platform/
#
# Published images are public. A one-time visibility flip runs after each
# run; the flip is idempotent.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Reuse the CI workflow as a gate so we never publish a broken build.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    with:
      # The publish gate is a release validation, not a PR check, so path
      # filtering must not skip anything. Force the full suite to run
      # regardless of which files were touched in the merge commit.
      force-all: true

  # ---------------------------------------------------------------------------
  # Build each component for each platform on its native runner. Each job
  # pushes by digest only (no tags). Tags are applied by the `merge` job.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.component }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: ci-gate
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend, node-agent]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
          - component: backend
            context: .
            file: backend/Dockerfile
          - component: frontend
            # Repo-root context (not frontend/): the frontend image needs the
            # docs source at docs/site, read by the vite docs-sync publish-gate
            # at build time, which lives outside frontend/. See frontend/Dockerfile.
            context: .
            file: frontend/Dockerfile
          - component: node-agent
            context: .
            file: cli/Dockerfile.node
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase image repo
        id: repo
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/nyxid/${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only -- tags are applied by the merge job on the manifest list.
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          labels: |
            org.opencontainers.image.title=nyxid-${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Compute short git hash
        id: git
        run: echo "hash=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-args: git hash for backend/node-agent surface tagging
          # (stamped on /health). Telemetry config is fetched at runtime
          # from the backend's /api/v1/public/config endpoint, so no
          # build-args for telemetry are needed here.
          build-args: |
            NYXID_GIT_HASH=${{ steps.git.outputs.hash }}
          outputs: type=image,name=${{ steps.repo.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.platform_pair }}
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.component }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Merge per-arch digests into a multi-arch manifest list per component and
  # apply the real tags. One merge job per component.
  # ---------------------------------------------------------------------------
  merge:
    name: Merge ${{ matrix.component }} manifest
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend, node-agent]
    steps:
      - name: Compute lowercase image repo
        id: repo
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/nyxid/${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            # Tag pushes: semver ladder + `latest`
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Main branch pushes: rolling tags
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.repo.outputs.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ steps.repo.outputs.image }}:${{ steps.meta.outputs.version }}

  # ---------------------------------------------------------------------------
  # Flip new packages to public visibility. Idempotent: a no-op once public.
  # Runs only on push events (not workflow_dispatch) to avoid surprises.
  # ---------------------------------------------------------------------------
  make-public:
    name: Ensure public visibility
    runs-on: ubuntu-latest
    needs: merge
    if: github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - name: Flip package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for component in backend frontend node-agent; do
            package="nyxid/${component}"
            encoded=$(printf '%s' "$package" | jq -sRr @uri)
            echo "Ensuring ghcr.io/${owner}/${package} is public..."
            gh api \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${owner}/packages/container/${encoded}/visibility" \
              -f visibility=public \
              || echo "  (skipped: package may not exist yet or already public)"
          done
