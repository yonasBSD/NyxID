name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    # `main` is intentionally not listed here -- pushes to main are gated
    # through publish-images.yml, which calls this workflow via workflow_call.
    # Listing main twice would cause CI to run on every merge commit twice.
    branches: [dev]
  # Allow other workflows (publish-images, release) to reuse this one as a
  # gate via `uses: ./.github/workflows/ci.yml`.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ---------------------------------------------------------------------------
  # Rust: format check
  # ---------------------------------------------------------------------------
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Rust: clippy lint
  # ---------------------------------------------------------------------------
  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Rust: backend build + test
  # Handler + service tests call `connect_test_database` which probes a local
  # MongoDB on 27017 (no auth) then 27018 (auth, used by the dev docker-compose
  # override) and skips when neither is reachable. The service container below
  # satisfies the 27017 probe so those tests actually run instead of silently
  # skipping.
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: backend
      - uses: taiki-e/install-action@nextest

      - name: Build backend
        run: cargo build -p nyxid

      - name: Run backend tests
        run: cargo nextest run -p nyxid --profile ci

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: target/nextest/ci/junit.xml
          show: all

  # ---------------------------------------------------------------------------
  # Rust: CLI / node-agent build + test (no DB required)
  # ---------------------------------------------------------------------------
  cli-test:
    name: CLI Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli
      - uses: taiki-e/install-action@nextest

      - name: Build CLI
        run: cargo build -p nyxid-cli

      - name: Run CLI tests
        run: cargo nextest run -p nyxid-cli --profile ci

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: target/nextest/ci/junit.xml
          show: all

  # ---------------------------------------------------------------------------
  # Rust: build with feature flags (KMS providers)
  # ---------------------------------------------------------------------------
  rust-features:
    name: Rust Features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: aws-kms
            cache-suffix: aws-kms
          - features: gcp-kms
            cache-suffix: gcp-kms
          - features: aws-kms,gcp-kms
            cache-suffix: aws-and-gcp-kms
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features-${{ matrix.cache-suffix }}
      - name: Build with --features ${{ matrix.features }}
        run: cargo build -p nyxid --features ${{ matrix.features }}

  # ---------------------------------------------------------------------------
  # Frontend: lint, type-check, test, build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # ---------------------------------------------------------------------------
  # CLI wizard bundle: fast touch-check sentinel.
  #
  # Catches the most common "forgot to rebuild the wizard" mistake in <10s
  # by pattern-matching the PR's changed files — no npm install, no build,
  # just `git diff`. If wizard sources were touched but the committed
  # `cli/src/wizard/assets/index.html` bundle wasn't, fail early with a
  # clear error pointing at the exact command to run.
  #
  # The `wizard-bundle` job below remains the authoritative drift check
  # (rebuilds the bundle and byte-compares against HEAD). This sentinel is
  # pure feedback-speed layered on top: it catches "you didn't attempt" in
  # ~10s; the drift job catches "your attempt didn't match" in ~1-2min.
  # ---------------------------------------------------------------------------
  wizard-bundle-touch-check:
    name: CLI Wizard Bundle Touch Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need HEAD~1 for the diff. On `pull_request` events GitHub
          # checks out a synthetic `refs/pull/N/merge` commit whose
          # first parent is the base branch tip, so `HEAD~1..HEAD`
          # cleanly reveals the PR's file changes. On `push` events
          # it's the previous commit on the branch.
          fetch-depth: 2
      - name: Fail if wizard sources changed but bundle didn't
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          src=$(echo "$changed" | grep -E '^frontend/(src/(components/cli-wizard/|wizard-entry\.tsx|pages/cli-pair/)|wizard\.html|vite\.wizard\.config\.ts)' || true)
          bundle=$(echo "$changed" | grep -E '^cli/src/wizard/assets/index\.html$' || true)
          if [ -n "$src" ] && [ -z "$bundle" ]; then
            {
              echo "::error::Wizard sources changed but cli/src/wizard/assets/index.html wasn't updated."
              echo ""
              echo "Touched wizard source files:"
              echo "$src" | sed 's/^/  - /'
              echo ""
              echo "Rebuild and commit the bundle:"
              echo "  npm --prefix frontend run build:wizard"
              echo "  cp frontend/dist-wizard/wizard.html cli/src/wizard/assets/index.html"
              echo "  git add cli/src/wizard/assets/index.html"
            } >&2
            exit 1
          fi
          echo "OK: wizard bundle touch-state is consistent with source changes."

  # ---------------------------------------------------------------------------
  # CLI wizard bundle: authoritative drift check.
  #
  # The CLI embeds the React wizard bundle at `cli/src/wizard/assets/index.html`
  # via rust_embed. The bundle is generated by `npm run build:wizard` from
  # `frontend/src/wizard-entry.tsx` and the shared `components/cli-wizard/*`
  # components. We commit the built artifact (Option: "Committed prebuilt
  # artifact" — see the UX polish plan) so `cargo build -p nyxid-cli` doesn't
  # need a Node toolchain. This job guards against the artifact drifting
  # from the React source: rebuild on every PR, fail if the output doesn't
  # match HEAD.
  #
  # Paired with `wizard-bundle-touch-check` above — that sentinel gives
  # ~10s feedback on the common "forgot to rebuild" mistake; this job is
  # the byte-accurate correctness gate (~1-2min).
  #
  # Workflow:
  #   after editing `frontend/src/components/cli-wizard/**` or related
  #   components/schemas, run `npm --prefix frontend run build:wizard` and
  #   commit the resulting `cli/src/wizard/assets/index.html`.
  # ---------------------------------------------------------------------------
  wizard-bundle:
    name: CLI Wizard Bundle Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build:wizard
        working-directory: frontend
      - name: Install freshly-built bundle
        run: cp frontend/dist-wizard/wizard.html cli/src/wizard/assets/index.html
      - name: Assert no drift vs committed bundle
        run: |
          if ! git diff --exit-code -- cli/src/wizard/assets/index.html; then
            echo "::error::cli/src/wizard/assets/index.html is stale." >&2
            echo "Run 'npm --prefix frontend run build:wizard' and commit the result." >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # SDK: build all packages
  # ---------------------------------------------------------------------------
  sdk:
    name: SDK Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      - run: npm run build
